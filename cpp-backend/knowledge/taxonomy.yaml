# API Groupings
# =============
# Logical groupings for related APIs

api_groups:
  core:
    label: "Core Advertising"
    description: "Essential Campaign management"
    apis: [campaign-api, creative-api]
    primary_entities: [insertion_order, campaign, creative]
    quickstarts:
      - create-a-campaign-quickstart
      - upload-a-creative-quickstart
      
  targeting:
    label: "Targeting"
    description: "Audience and Inventory targeting"
    apis: [audience-api, inventory-api]
    primary_entities: [audience, inventory]
    quickstarts:
      - matched-audience-upload-api-quickstart-guide
      - contextual-audience-quickstart
      - inventory-quickstart
      
  measurement:
    label: "Measurement & Analytics"
    description: "Tracking, reporting, and Insights"
    apis: [conversion-api, reports-api, dashboard-api, insights-api]
    primary_entities: [conversion, report]
    quickstarts:
      - conversion-quickstart
      - reporting-api-quickstart-guide
      - insights-quickstart
      
  optimization:
    label: "Optimization"
    description: "Bid strategies and performance tuning"
    apis: [bid-model-api]
    primary_entities: [bid_model]
    quickstarts:
      - bid-model-quickstart
      
  management:
    label: "Management"
    description: "Organization, users, and finance"
    apis: [user-api, workspace-api, finance-api]
    primary_entities: [workspace, workspace_user, customer]
    quickstarts:
      - authentication-quickstart-guide

# Workflow Patterns
# =================
# Common multi-step operations

workflow_patterns:
  full_campaign_setup:
    name: "Complete Campaign Setup"
    description: "End-to-end Campaign creation with all targeting"
    sequence:
      - step: authenticate
        entity: workspace_user
        endpoint: POST /api/v3/ua/login
        doc: /quickstart-guides/authentication-quickstart-guide

      - step: upload_creatives
        entity: creative
        endpoint: POST /api/v3/crt/creatives
        doc: /quickstart-guides/upload-a-creative-quickstart
        
      - step: create_io
        entity: insertion_order
        endpoint: POST /api/v3/cmp/io/add
        doc: /guidelines/campaign-api/#create-an-insertion-order
        
      - step: create_campaign
        entity: campaign
        endpoint: POST /api/v2/cmp/campaigns/add
        doc: /quickstart-guides/create-a-campaign-quickstart
        
    # Optional actions to enhance your campaign after creation
    more_actions:
      - step: assign_audience
        entity: audience
        endpoint: POST /api/v3/cmp/target/audience
        doc: /guidelines/campaign-api#update-audience-targeting-in-campaigns
        description: "Target specific Audience segments"
        
      - step: assign_conversions
        entity: conversion
        endpoint: POST /api/v3/conversion/assign-to/campaign
        doc: /tutorials/create-a-conversion
        description: "Track Conversion events"
        
      - step: set_inventory
        entity: inventory
        endpoint: POST /api/v2/cmp/inventorygroups/{groupId}/includeExclude
        doc: /tutorials/optimize-your-inventory
        description: "Include/exclude Inventory Groups"
        
      - step: configure_bidding
        entity: bid_model
        endpoint: PUT /api/v3/bm/campaigns/{campaignId}/bid-models/{dimensionId}
        doc: /tutorials/create-a-bid-model/
        description: "Create a Bid Model"
        
    primary_doc: /quickstart-guides/create-a-campaign-quickstart/
    
  conversion_tracking:
    name: "Set Up Conversion Tracking"
    description: "Create and assign Conversion pixels"
    sequence:
      - step: create_pixel
        entity: conversion
        endpoint: POST /api/v3/conversion/add
        
      - step: implement_pixel
        description: "Add pixel code to website"
        
      - step: assign_to_campaign
        entity: conversion
        endpoint: POST /api/v3/conversion/assign-to/campaign
        
      - step: verify_tracking
        description: "Confirm Conversion events firing"
        
    primary_doc: /quickstart-guides/conversion-quickstart
    
  reporting_workflow:
    name: "Generate and Schedule Reports"
    description: "Create performance Reports"
    sequence:
      - step: define_report
        entity: report
        endpoint: POST /api/v3/ra/report/add
        
      - step: download_report
        entity: report
        endpoint: GET /api/v3/ra/report/{reportId}/download
        
      - step: schedule_recurring
        entity: report
        endpoint: POST /api/v3/ra/report/schedule
        optional: true
        
    primary_doc: /quickstart-guides/reporting-api-quickstart-guide
    related_doc: /quickstart-guides/schedule-report-api-quickstart-guide
    
  audience_creation:
    name: "Build Targeting Audience"
    description: "Create and upload Audience data"
    sequence:
      - step: prepare_data
        description: "Format Audience file (emails, devices, etc.)"
        
      - step: upload_audience
        entity: audience
        endpoint: POST /api/v2/audience/matched/add
        
      - step: wait_processing
        description: "Audience processing (may take time)"
        
      - step: assign_to_campaign
        entity: audience
        description: "Target Audience in Campaign"
        
    primary_doc: /tutorials/upload-a-matched-audience/

# Action Types
# ============
# Standard operations across all entities

action_types:
  crud:
    - name: create
      methods: [POST]
      description: "Create new entity"
    - name: read
      methods: [GET]
      description: "Get entity details"
    - name: update
      methods: [PUT, PATCH]
      description: "Modify entity"
    - name: delete
      methods: [DELETE]
      description: "Remove entity"
    - name: list
      methods: [GET, POST]
      description: "List multiple entities"
      
  assignment:
    - name: assign
      description: "Link entity to another"
    - name: unassign
      description: "Unlink entity from another"
      
  lifecycle:
    - name: activate
      description: "Set entity to active/running"
    - name: pause
      description: "Temporarily stop entity"
    - name: archive
      description: "Deactivate and archive entity"
      
  bulk:
    - name: bulk_create
      description: "Create multiple entities"
    - name: bulk_update
      description: "Update multiple entities"
    - name: bulk_delete
      description: "Delete multiple entities"
