# Documentation Categories
# ========================
# Derived from sidebars.js structure
# Each category has a learning weight (fundamental → advanced)

doc_categories:
  getting-started:
    label: "Getting Started"
    description: "Foundation knowledge for new users"
    weight: 4  # Most fundamental - MUST understand first
    path: /getting-started
    docs:
      - id: index
        label: "Overview"
      - id: platform-overview
        label: "IQM Platform Overview"
        entity_focus: [workspace]
      - id: rest-api-reference
        label: "REST API Overview"
        concepts: [authentication, headers, base_url]
      - id: before-you-begin
        label: "Before You Begin"
        concepts: [owId, authentication, sandbox]
      - id: typescript-prerequisites
        label: "TypeScript Prerequisites"
        optional: true
      - id: api-pagination-guide
        label: "API Filtering and Pagination"
        concepts: [pagination, filtering, sorting]
    leads_to: [quickstart-guides]
    prerequisites: []
    
  quickstart-guides:
    label: "Quickstart Guides"
    description: "Task-oriented quick starts for specific actions"
    weight: 3
    path: /quickstart-guides
    docs:
      - id: authentication-quickstart-guide
        label: "Sign Up and Authenticate"
        entity_focus: [workspace_user]
        actions: [signup, login, refresh_token]
        
      - id: upload-a-creative-quickstart
        label: "Upload a Creative"
        entity_focus: [creative]
        actions: [create]
        
      - id: create-a-campaign-quickstart
        label: "Create a Campaign"
        entity_focus: [campaign, insertion_order]
        actions: [create]
        
      - id: contextual-audience-quickstart
        label: "Create a Contextual Audience"
        entity_focus: [audience]
        actions: [create]
        
      - id: reporting-api-quickstart-guide
        label: "Generate Reports"
        entity_focus: [report]
        actions: [create, download]
        
      - id: schedule-report-api-quickstart-guide
        label: "Schedule Reports"
        entity_focus: [report]
        actions: [schedule]
        
  tutorials:
    label: "Tutorials"
    description: "In-depth workflow tutorials"
    weight: 3
    path: /tutorials
    docs:
      - id: create-a-pg-campaign
        label: "Create a PG Campaign"
        entity_focus: [campaign, deal]
        actions: [create, assign]
        
      - id: upload-a-matched-audience
        label: "Upload a Matched Audience"
        entity_focus: [audience]
        actions: [create, upload]
        
      - id: create-a-conversion
        label: "Set Up Conversion Tracking"
        entity_focus: [conversion]
        actions: [create, assign]
        
      - id: optimize-your-inventory
        label: "Optimize Your Inventory"
        entity_focus: [inventory_group]
        actions: [target, include_exclude]
        
      - id: create-a-bid-model
        label: "Configure Bid Models"
        entity_focus: [bid_model]
        actions: [configure, assign]
        
      - id: create-an-insights-report
        label: "Create an Insights Report"
        entity_focus: [report]
        actions: [generate]
        
      - id: customer-guide
        label: "Customer Management Guide"
        entity_focus: [customer]
        actions: [create, update, manage]
        
      - id: deal-guide
        label: "Deal Management Guide"
        entity_focus: [deal]
        actions: [create, assign]
        
    requires: [getting-started]
    leads_to: [guidelines]
    
  guidelines:
    label: "API Guidelines"
    description: "Complete API reference documentation"
    weight: 2
    path: /guidelines
    docs:
      # Core Advertising
      - id: campaign-api
        label: "Campaign API"
        entity_focus: [insertion_order, campaign]
        api: campaign-api
        
      - id: creative-api
        label: "Creative API"
        entity_focus: [creative]
        api: creative-api
        
