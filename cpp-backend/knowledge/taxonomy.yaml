      - id: audience-api
        label: "Audience API"
        entity_focus: [audience]
        api: audience-api
        
      - id: inventory-api
        label: "Inventory API"
        entity_focus: [inventory]
        api: inventory-api
        
      # Measurement
      - id: conversion-api
        label: "Conversion API"
        entity_focus: [conversion]
        api: conversion-api
        
      - id: reports-api
        label: "Reports API"
        entity_focus: [report]
        api: reports-api
        
      - id: dashboard-api
        label: "Dashboard API"
        entity_focus: [dashboard]
        api: dashboard-api
        
      - id: insights-api
        label: "Insights API"
        entity_focus: [vld_report]
        api: insights-api
        
