# Layer 1: SKELETON (Foundation - Weight 4)
# What entities exist? What are their relationships?
# Source: api-sdk-pipeline/layers/taxonomy/entity-hierarchy.yaml + docs structure
# 
# PVLT: This is the foundation. Higher layers cannot contradict skeleton.

# Entity Hierarchy
# ================
# Defines what exists, how things relate, and what IDs/endpoints matter.

entities:
  # ============================================
  # ORGANIZATION TIER
  # ============================================
  
  workspace:
    id_field: owId
    header: X-IAA-OW-ID
    level: 0
    description: "Company providing DSP service. Defines permissions for Customers."
    children: [workspace_user]
    docs:
      primary: /getting-started/platform-overview
      related:
        - /guidelines/workspace-api
        - /guidelines/user-api
    api: user-api
    help_center: https://help.iqm.com/en/collections/1387052-manage-your-organization
    
  workspace_user:
    id_field: userId
    level: 1
    parent: workspace
    description: "Individual platform user within a Workspace."
    children: [customer]
    docs:
      primary: /getting-started/before-you-begin
      related:
        - /guidelines/user-api
        - /quickstart-guides/authentication-quickstart-guide
    api: user-api
    
  customer:
    id_field: owId
    aliases: [advertiserId, organizationId, customerId, advertiser, organization]
    level: 2
    parent: workspace_user
    description: "Organization/Advertiser assigned to a Workspace User. Places advertisements with the DSP service."
    children: [insertion_order]
    docs:
      primary: /tutorials/customer-guide
      related:
        - /guidelines/workspace-api
        - /guidelines/finance-api
        - /getting-started/platform-overview
    api: workspace-api
    help_center: https://help.iqm.com/en/articles/8365221-how-to-add-a-customer

  # Aliases for customer entity (for LLM extraction)
  advertiser:
    id_field: advertiserId
    aliases: [customer, organization, advertiser account]
    level: 2
    parent: workspace_user
    description: "A user or Customer on the IQM platform that places advertisements with a media partner."
    docs:
      primary: /getting-started/platform-overview
      section: "#advertising-hierarchy"
      related:
        - /guidelines/workspace-api
    api: workspace-api
    
  organization:
    id_field: organizationId
    aliases: [customer, advertiser, org]
    level: 2
    parent: workspace_user
    description: "A company that places advertisements and is assigned to a Workspace User."
    docs:
      primary: /getting-started/platform-overview
      section: "#organization-hierarchy"
      related:
        - /guidelines/workspace-api
    api: workspace-api

  # ============================================
  # ADVERTISING TIER
  # ============================================
  
  insertion_order:
    id_field: ioId
    level: 3
    parent: customer
    description: "Contract specifying Campaign parameters, budget, and timeframe."
    aliases: [IO, insertion order, insertion orders, IOs]
    children: [campaign]
    docs:
      primary: /guidelines/campaign-api
      section: "#insertion-orders"
      related:
        - /quickstart-guides/create-a-campaign-quickstart
    api: campaign-api
    related_apis: [bid-model-api]
    endpoints:
      create: POST /api/v3/cmp/io/add
      list: POST /api/v3/cmp/io/basic/list
      get: GET /api/v3/cmp/io/{ioId}
      update_budget: PATCH /api/v3/cmp/io/update-budget
      assign_priority: PUT /api/v3/bm/io/{ioId}/bid-models
    properties:
      - budget_total
      - budget_daily
      - start_date
      - end_date
      - status
    help_center: https://help.iqm.com/en/articles/8365220-what-is-an-insertion-order
    
  campaign:
    id_field: campaignId
    level: 4
    parent: insertion_order
    description: "Targeted advertising run with optimization strategies."
    children: [creative, audience, conversion, inventory]
    docs:
      primary: /quickstart-guides/create-a-campaign-quickstart
      related:
        - /guidelines/campaign-api
        - /quickstart-guides/upload-creative-and-create-a-campaign-api-quickstart-guide
    api: campaign-api
    related_apis: [bid-model-api, conversion-api, insights-api, inventory-api, reports-api]
    endpoints:
      create: POST /api/v2/cmp/campaigns/add
      create_pg: POST /api/v3/cmp/pg/campaigns/add
      get: GET /api/v2/cmp/campaign/{campaignId}
      list: POST /api/v3/cmp/io/campaigns/list
      assign_conversions: POST /api/v3/cmp/target/conversion
      assign_audiences: POST /api/v3/cmp/target/audience
      bid_modeling: PUT /api/v3/bm/campaigns/{campaignId}/bid-models/{dimensionId}
      inventory_targeting: POST /api/v2/inv/inventories/includeExclude
      run_report: POST /api/v3/ra/report/add
    campaign_types:
      - id: 1
        name: Advanced
        description: "Standard programmatic campaign"
      - id: 2
        name: Programmatic Guaranteed (PG)
        description: "Direct deal campaign"
    properties:
      - budget_total
      - budget_daily
      - max_bid
      - start_date
      - end_date
      - status
      - targeting
      - optimization_strategy
    help_center: https://help.iqm.com/en/articles/11497668-campaigns-overview

  # ============================================
  # CAMPAIGN CHILDREN (Level 5)
  # ============================================
  
  creative:
    id_field: creativeId
    level: 5
    parent: campaign
    relationship_type: assignment  # assigned to campaign
    description: "Ad content file (image, video, audio, HTML, native)."
    docs:
      primary: /quickstart-guides/upload-a-creative-quickstart
      related:
        - /guidelines/creative-api
    api: creative-api
    endpoints:
      create: POST /api/v3/crt/creatives
      get: GET /api/v3/crt/creatives/{creativeId}
      create_group: POST /api/v3/crt/creatives/groups
      modify_group: POST /api/v3/crt/creatives/groups/modify-creatives
    creative_types:
      - id: 11
        name: Image
        description: "Display banner ad"
      - id: 13
        name: HTML
        description: "Rich media ad"
      - id: 14
        name: Video
        description: "Video ad (pre-roll, mid-roll, etc.)"
      - id: 15
        name: Native
        description: "Native ad format"
      - id: 17
        name: Audio
        description: "Audio ad (podcast, streaming)"
    help_center: https://help.iqm.com/en/collections/1387054-manage-your-creatives
    
  audience:
    id_field: audienceId
    level: 5
    parent: campaign
    relationship_type: targeting  # targeted by campaign
    description: "Targeting segments for reaching specific users."
    docs:
      primary: /quickstart-guides/matched-audience-upload-api-quickstart-guide
      related:
        - /guidelines/audience-api
        - /quickstart-guides/contextual-audience-quickstart
    api: audience-api
    endpoints:
      create_matched: POST /api/v2/audience/matched/add
      list: GET /api/v2/audience/list
    audience_types:
      - id: 1
        name: Matched Audience
        description: "First-party data audience (email, device IDs, etc.)"
      - id: 2
        name: Segmented Audience
        description: "Pre-built audience segments"
      - id: 10
        name: Custom Voter Audience
        description: "Political vertical voter targeting"
      - id: 3
        name: Retargeted Audience
        description: "Users who previously interacted with ads"
      - id: 4
        name: Geofarmed Audience
        description: "Location-based audience from geofencing"
      - id: 5
        name: Contextual Audience
        description: "Content and context-based targeting"
      - id: 6
        name: Lookalike Audience
        description: "Similar users to existing audience"
      - id: 7
        name: Campaign Audience
        description: "Audience derived from Campaign performance"
      - id: 8
        name: Pre-bid Audience
        description: "Pre-bid targeting segments"
    help_center: https://help.iqm.com/en/articles/11748442-create-or-manage-a-matched-audience
    
  conversion:
    id_field: conversionId
    aliases: [conversions, conversion pixel, tracking pixel, conversion tracking, attribution, conversion management]
    level: 5
    parent: campaign
    relationship_type: assignment  # assigned to Campaign
    description: "Tracking pixels and attribution for Campaign measurement. Manage conversion pixels and tracking."
    docs:
      primary: /guidelines/conversion-api
      related:
        - /quickstart-guides/conversion-quickstart
    api: conversion-api
    related_apis: [campaign-api]
    endpoints:
      create: POST /api/v3/conversion/add
      assign_to_campaign: POST /api/v3/conversion/assign-to/campaign
      get: GET /api/v3/conversion/{conversionId}
    conversion_types:
      - id: 1
        name: Pixel
        description: "Client-side tracking with advanced settings for fine-tuned optimization"
      - id: 2
        name: Postback
        description: "Server-side tracking"
    help_center: https://help.iqm.com/en/collections/3219750-choose-your-conversion
    
  inventory:
    level: 4
    parent: campaign
    relationship_type: targeting
    description: "Inventory sources (websites, apps, exchanges) where ads can be served. Manage deals, inventory groups, and targeting."
    aliases:
      - placements
      - inventory sources
      - ad placements
      - inventory management
      - inventories
    docs:
      primary: /guidelines/inventory-api
      related:
        - /quickstart-guides/inventory-quickstart
        - /tutorials/deal-guide
    api: inventory-api
    endpoints:
      include_exclude: POST /api/v2/inv/inventories/includeExclude
      list_exchanges: GET /api/v3/inv/exchanges
      list_assigned: GET /api/v3/inv/exchange-list/campaign/{campaignId}
    help_center: https://help.iqm.com/en/articles/9615727-assign-private-marketplace-pmp-deals-or-inventory-groups-to-a-campaign
    
  deal:
    id_field: dealId
    level: 5
    parent: campaign
    relationship_type: targeting  # Deals are targeted by Campaigns
    description: "Private marketplace or programmatic guaranteed Deals for premium Inventory access."
    docs:
      primary: /tutorials/deal-guide
      related:
        - /guidelines/inventory-api
    api: inventory-api
    endpoints:
      create_pg: POST /api/v3/inv/pg/deals/add
      create_pmp: POST /api/v3/inv/pmp/deals/add
      list_pg: GET /api/v3/inv/pg/deals
      list_pmp: GET /api/v3/inv/pmp/deals
      assign_to_campaign: POST /api/v3/inv/deals/assign
    deal_types:
      - id: 1
        name: PMP
        description: "Private Marketplace - invitation-only auction for premium inventory"
      - id: 2
        name: PG
        description: "Programmatic Guaranteed - fixed price, guaranteed inventory"
    help_center: https://help.iqm.com/en/articles/9615727-assign-private-marketplace-pmp-deals-or-inventory-groups-to-a-campaign
    
  inventory_group:
    id_field: groupId
    level: 5
    parent: campaign
    relationship_type: targeting  # targeted by Campaign
    description: "Collections of Inventory sources grouped by specific criteria."
    docs:
      primary: /quickstart-guides/inventory-quickstart
      related:
        - /guidelines/inventory-api
    api: inventory-api
    endpoints:
      create: POST /api/v3/inv/groups/add
      list: GET /api/v3/inv/groups
      include_exclude: POST /api/v2/inv/inventories/includeExclude
      get_pmp_deals: GET /api/v3/group/{groupId}/pmp-deals
    group_types:
      - id: 1
        name: Open Exchange
        description: "Public RTB exchange inventory"
      - id: 2
        name: PMP
        description: "Inventory group containing PMP deals"
      - id: 3
        name: Contextual
        description: "Contextual targeting inventory"
    help_center: https://help.iqm.com/en/articles/9615727-assign-private-marketplace-pmp-deals-or-inventory-groups-to-a-campaign

  # ============================================
  # SUPPORTING ENTITIES
  # ============================================
  
  report:
    id_field: reportId
    aliases: [reports, reporting, report management, reports management, analytics report]
    level: 5
    parent: campaign  # Reports on Campaigns (not contained)
    relationship_type: analytics
    description: "Performance and analytics Reports. Manage, schedule, and generate reports."
    docs:
      primary: /guidelines/reports-api
      related:
        - /quickstart-guides/reporting-api-quickstart-guide
        - /quickstart-guides/schedule-report-api-quickstart-guide
    api: reports-api
    related_apis: [dashboard-api, insights-api]
    endpoints:
      create: POST /api/v3/ra/report/add
      schedule: POST /api/v3/ra/report/schedule
      get: GET /api/v3/ra/report/{reportId}
    help_center: https://help.iqm.com/en/articles/10343879-generate-manage-or-send-a-report
    
  bid_model:
    id_field: bidModelId
    level: 5
    parent: campaign
    relationship_type: configuration
    description: "Bid strategies and optimization settings."
    docs:
      primary: /quickstart-guides/bid-model-quickstart
      related:
        - /guidelines/bid-model-api
    api: bid-model-api
    endpoints:
      manage_campaign_bm: PUT /api/v3/bm/campaigns/{campaignId}/bid-models/{dimensionId}
      create_bm_bundle: POST /api/v3/bm/campaigns/{campaignId}/dimensions/{dimensionId}/bundles
      update_bm_bundle: PATCH /api/v3/bm/campaigns/{campaignId}/dimensions/{dimensionId}/bundles
      manage_io_bm: PUT /api/v3/bm/io/{ioId}/bid-models
      assign_io_priority_bm: POST /api/v3/bm/io/{ioId}/bid-models
      get_bm_dimensions: GET /api/v3/bm/static/dimensions
    help_center: https://help.iqm.com/en/articles/8369028-bid-model-overview

  # ============================================
  # ADDITIONAL SUPPORTING ENTITIES
  # ============================================
  
  dashboard:
    id_field: dashboardId
    level: 5
    parent: workspace
    relationship_type: analytics
    description: "UI dashboard for Campaign metrics and visualization."
    docs:
      primary: /guidelines/dashboard-api
    api: dashboard-api
    endpoints:
      get_metrics: GET /api/v2/rb/dashboard

  insights:
    id_field: insightsId
    level: 4
    parent: campaign
    relationship_type: analytics
    description: "Analytics reports including Campaign Bidding Insights, Audience Insights, VLD, PLD, and ScriptLift Studies."
    aliases: [insights, insights report, insights reports, audience insights, bidding insights, campaign insights, insights management]
    children: [vld_report, pld_report]
    docs:
      primary: /guidelines/insights-api
      related:
        - /quickstart-guides/insights-quickstart
        - /political-vertical/insights-vld
        - /healthcare-vertical/insights-pld
    api: insights-api
    
  vld_report:
    id_field: vldReportId
    level: 5
    parent: campaign
    relationship_type: analytics
    description: "Voter Level Data Report for political advertising Insights."
    aliases: [VLD, VLD report, voter level data, political insights]
    docs:
      primary: /political-vertical/insights-vld
      related:
        - /guidelines/insights-api
    api: insights-api
    vertical: political
    
  pld_report:
    id_field: pldReportId
    level: 5
    parent: campaign
    relationship_type: analytics
    description: "Provider Level Data Report for healthcare advertising Insights."
    aliases: [PLD, PLD report, provider level data, healthcare insights]
    docs:
      primary: /healthcare-vertical/insights-pld
      related:
        - /guidelines/insights-api
    api: insights-api
    vertical: healthcare
    
  payment:
    id_field: paymentId
    level: 3
    parent: customer
    relationship_type: configuration
    description: "Payment methods and transactions for billing."
    docs:
      primary: /guidelines/finance-api
      section: "#payments"
    api: finance-api
    
  invoice:
    id_field: invoiceId
    level: 3
    parent: customer
    relationship_type: analytics
    description: "Invoice records for billing and accounting."
    docs:
      primary: /guidelines/finance-api
      section: "#invoices"
    api: finance-api
    
  credit:
    id_field: creditId
    level: 3
    parent: customer
    relationship_type: configuration
    description: "Credit balance and adjustments."
    docs:
      primary: /guidelines/finance-api
      section: "#credits"
    api: finance-api
    
  asset:
    id_field: assetId
    level: 5
    relationship_type: assignment
    description: "Media files (images, videos) uploaded for Creatives."
    docs:
      primary: /guidelines/asset-api
    api: asset-api
    endpoints:
      upload: POST /api/v3/ast/assets
      get: GET /api/v3/ast/assets/{assetId}
      
  plan:
    id_field: planId
    level: 4
    parent: customer
    relationship_type: configuration
    description: "Campaign planning and forecasting."
    docs:
      primary: /guidelines/planner-api
    api: planner-api
    
  reference_data:
    id_field: null
    level: 0
    description: "Static lookup data (countries, states, device types, timezones, etc.) for targeting and configuration."
    aliases: 
      - master data
      - lookup data
      - lookup table
      - static data
      - segment IDs
      - targeting IDs
      - geographic data
      - demographic data
      - device data
      - timezone
      - timezones
      - country
      - countries
      - state
      - states
      - city
      - cities
      - county
      - counties
      - DMA
      - DMA codes
      - zip codes
      - age segment
      - gender segment
      - language segment
      - income segment
      - ethnicity segment
      - interest segment
      - device type
      - device types
      - device OS
      - operating system
      - manufacturers
      - carriers
      - creative types
      - creative sizes
      - inventory types
      - exchanges
      - traffic types
      - network types
      - verticals
      - video parameters
    docs:
      primary: /guidelines/master-api
    api: master-api
    endpoints:
      countries: GET /api/v3/master/countries
      states: GET /api/v3/master/states
      cities: GET /api/v3/master/cities
      counties: GET /api/v3/master/counties
      dma: GET /api/v3/master/dma
      timezones: GET /api/v3/master/timezones
      device_types: GET /api/v3/master/deviceTypes
      device_os: GET /api/v3/master/device-os
      creative_types: GET /api/v3/master/rtb-creative-types
      creative_sizes: GET /api/v3/master/creative-sizes
      age_segments: GET /api/v3/master/age
      gender_segments: GET /api/v3/master/genders
      languages: GET /api/v3/master/languages
      income_ranges: GET /api/v3/master/income-ranges
      ethnicities: GET /api/v3/master/ethnicities
      interests: GET /api/v3/master/interests
      manufacturers: GET /api/v3/master/manufacturers
      inventory_types: GET /api/v3/master/inventory-types
      traffic_types: GET /api/v3/master/traffic-types
      network_types: GET /api/v3/master/network-types
      exchanges: GET /api/v3/master/exchanges
      verticals: GET /api/v3/master/verticals

# Relationship Types
# ==================
relationships:
  parent_child:
    description: "Hierarchical containment (Insertion Order contains Campaigns)"
    implies: "Child cannot exist without parent"
    
  assignment:
    description: "Entity assigned to another (Conversion assigned to Campaign)"
    implies: "Entity created independently, then linked"
    
  targeting:
    description: "Entity used for targeting (Audience targeted by Campaign)"
    implies: "Targeting criteria selection"
    
  configuration:
    description: "Entity configures another (Bid Model configures Campaign)"
    implies: "Settings/strategy applied to entity"
    
  analytics:
    description: "Entity reports on another (Report analyzes Campaign)"
    implies: "Read-only relationship for measurement"

# API Registry
# ============
apis:
  user-api:
    base_path: /api/v3/ua
    primary_entities: [workspace, workspace_user]
    doc: /guidelines/user-api
    description: "Authentication, user management, workspace operations"
    
  workspace-api:
    base_path: /api/v3/ws
    primary_entities: [workspace, customer]
    doc: /guidelines/workspace-api
    description: "Workspace and organization management"
    
  campaign-api:
    base_paths: [/api/v2/cmp, /api/v3/cmp]
    primary_entities: [insertion_order, campaign]
    doc: /guidelines/campaign-api
    description: "Core advertising management - Insertion Orders and Campaigns"
    
  creative-api:
    base_path: /api/v3/crt
    primary_entities: [creative]
    doc: /guidelines/creative-api
    description: "Ad content management"
    
  audience-api:
    base_paths: [/api/v2/audience, /api/v3/audience]
    primary_entities: [audience]
    doc: /guidelines/audience-api
    description: "Targeting segments"
    
  conversion-api:
    base_path: /api/v3/conversion
    primary_entities: [conversion]
    doc: /guidelines/conversion-api
    description: "Attribution tracking"
    
  bid-model-api:
    base_path: /api/v3/bm
    primary_entities: [bid_model]
    doc: /guidelines/bid-model-api
    description: "Bid strategies and priority"
    
  inventory-api:
    base_path: /api/v2/inv
    primary_entities: [inventory]
    doc: /guidelines/inventory-api
    description: "Placement targeting"
    
  reports-api:
    base_path: /api/v3/ra
    primary_entities: [report]
    doc: /guidelines/reports-api
    description: "Performance reporting"
    
  dashboard-api:
    base_path: /api/v2/rb
    primary_entities: [dashboard]
    doc: /guidelines/dashboard-api
    description: "UI dashboard data"
    
  finance-api:
    base_path: /api/v3/fa
    primary_entities: [payment, invoice, credit]
    doc: /guidelines/finance-api
    description: "Financial operations"
    
  insights-api:
    base_path: /api/v3/ins
    primary_entities: [insights, vld_report, pld_report]
    doc: /guidelines/insights-api
    description: "Insights reports: Audience Insights, Campaign Bidding Insights, VLD, PLD, ScriptLift Studies"
    
  asset-api:
    base_path: /api/v3/ast
    primary_entities: [asset]
    doc: /guidelines/asset-api
    description: "File and media storage"
    
  planner-api:
    base_path: /api/v3/pl
    primary_entities: [plan]
    doc: /guidelines/planner-api
    description: "Campaign planning"
    
  master-api:
    base_path: /api/v3/master
    primary_entities: [reference_data]
    doc: /guidelines/master-api
    description: "Static/lookup data"

# Vertical Bifurcation
# ====================
verticals:
  political:
    description: "Political advertising with VLD reports"
    key_features:
      - Voter Level Data (VLD) reports
      - Demographic targeting
      - Voting history data
    apis: [insights-api]
    docs:
      - /political-vertical/index
      - /political-vertical/insights-vld
      - /political-vertical/audience-segments
      - /political-vertical/finance
      
  healthcare:
    description: "Healthcare advertising with PLD reports"
    key_features:
      - Patient Level Data (PLD) reports
      - HIPAA compliance considerations
    apis: [insights-api]
    docs:
      - /healthcare-vertical/index
      - /healthcare-vertical/insights-pld
      - /healthcare-vertical/audience-healthcare
      - /healthcare-vertical/finance
