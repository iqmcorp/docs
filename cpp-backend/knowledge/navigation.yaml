# Layer 3: NAVIGATION (Experience - Weight 2)
# How do users navigate? What are common paths?
# Source: Doc structure, help.iqm.com links, common user patterns
#
# PVLT: This layer maps user journeys. Cannot change structure or patterns.

# Intent Mapping
# ==============
# Maps natural language intents to resources

intents:
  # ============================================
  # AUTHENTICATION & SETUP
  # ============================================
  
  authenticate:
    patterns:
      - "how do I log in"
      - "authenticate"
      - "authentication"
      - "set up authentication"
      - "get access token"
      - "sign up"
      - "create account"
      - "API credentials"
      - "bearer token"
      - "how to log in"
      - "login"
      - "sign in"
      - "get started"
      - "first steps"
      - "get API access"
      - "authorization"
    entity: workspace_user
    action: login
    primary_doc: /quickstart-guides/authentication-quickstart-guide
    endpoint: POST /api/v3/ua/login
    related_docs:
      - /getting-started/before-you-begin
    clarifying_questions:
      - "Do you already have an IQM account?"
      - "Are you trying to log in or refresh an expired token?"
      
  refresh_token:
    patterns:
