      - /getting-started/platform-overview
      - /getting-started/before-you-begin
      - /quickstart-guides/authentication-quickstart-guide
      - /quickstart-guides/create-a-campaign-quickstart
      
  migration_user:
    name: "DSP Migration"
    description: "User migrating from another platform"
    entry_points:
      - /migration-guides/beeswax/overview
      - /migration-guides/dv360/overview
      - /migration-guides/xandr/overview
      - /migration-guides/the-trade-desk/overview
      
  api_developer:
